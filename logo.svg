<svg viewBox="0 0 440 160" xmlns="http://www.w3.org/2000/svg" role="img">
<title>NyvoraAI logo</title>
<desc>Logo for NyvoraAI featuring an abstract N mark in a rounded navy badge with a cyan accent node, paired with the wordmark Nyvora in navy and AI in cyan.</desc>
<defs>
<linearGradient id="badgeGrad" x1="0" y1="0" x2="1" y2="1">
<stop offset="0%" stop-color="#1B2A4A"/>
<stop offset="100%" stop-color="#26365E"/>
</linearGradient>
</defs>
<rect x="0" y="20" width="120" height="120" rx="28" fill="url(#badgeGrad)"/>
<path d="M30 110 L30 50 L90 110 L90 50" fill="none" stroke="#FFFFFF" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
<circle cx="90" cy="50" r="7" fill="#2DD4E0"/>
<text x="150" y="100" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="56" fill="#1B2A4A">Nyvora<tspan fill="#2DD4E0">AI</tspan></text>
</svg>
