name: Submit URLs to Google Indexing API

on:
  workflow_dispatch:

jobs:
  index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-auth requests

      - name: Write key file
        run: echo '${{ secrets.GCP_SA_KEY }}' > key.json

      - name: Submit URLs
        run: |
          python - <<'EOF'
          import json
          from google.oauth2 import service_account
          from google.auth.transport.requests import AuthorizedSession

          SCOPES = ["https://www.googleapis.com/auth/indexing"]
          credentials = service_account.Credentials.from_service_account_file("key.json", scopes=SCOPES)
          session = AuthorizedSession(credentials)

          with open("urls.txt") as f:
              urls = [line.strip() for line in f if line.strip()]

          for url in urls:
              payload = {"url": url, "type": "URL_UPDATED"}
              r = session.post("https://indexing.googleapis.com/v3/urlNotifications:publish", data=json.dumps(payload))
              print(url, r.status_code)
              if r.status_code != 200:
                  print(r.text)
          EOF
